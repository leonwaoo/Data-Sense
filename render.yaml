services:
  - type: web
    name: data-sense-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: CORS_ORIGINS
        value: https://data-sense.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
